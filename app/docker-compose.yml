version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: production_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: production_db
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: production_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: production_mq
    ports:
      - "5672:5672"
      - "15672:15672" # Панель управления (логин/пароль: guest/guest)

  minio:
    image: minio/minio
    container_name: production_s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

